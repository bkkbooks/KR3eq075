body:
  text: 正文有病的快來治病來了賣好靈藥的了藥有君臣佐使病分寒熱溫平大人看寸關尺脈小兒虎口三關憑的是脈理仗的是醫書無病傳有病兩家積陰功先有傳病的好處後有治病的功程有七八十的的臁瘡十數年的瘤瘡婦女科症下血小兒痞悶在心一治就好治病不留根病小好治樹大難栽病要早治香要早燒治就治好了病就病倒了莫要聽旁人之言誤了自己的性命或用湯藥或用眼藥或用丸藥或用散藥無有無藥的先生現今把賣藥之事說了與你們聽聽不是與你要錢不過是閒談閒語往日來的先生從你們這裡路過拿著兩個虎頭就說是虎頭熬的膏藥拿著熊掌就說是熊掌熬的膏藥他就說家裡有老虎油有病總不愁他說千應膏能治千般病又有萬應膏能治萬宗病不然他就說內有三十六味截藥又有七十二味末藥又有一百單八味細藥又有人參黃連麝香肉桂說了一大些值錢的細藥看起來有好材料為何貼病貼不好不過是聽他說得好這就是有其名而無其實目下我這膏藥幾味細藥不過是當面加減眼見是實耳聽是虛這膏藥里加木香這木香生在何處出在廣東瓊州府海南縣形似桂花一來能治嗝氣二來能治心疼木香木香原來出廣東能順諸氣又調腹疼若問此藥治何病善治九種心疼這就是木香的功程加上麒麟竭世人卻說麒麟竭當初嘆麒麟時節只說了一個死的如今世人卻說是活的別說是活的就是死的亦無人見過不讀那家書不識那家字我看過雷公炮炙書書上說的明白血竭生在雲南波斯國這就是婦人科的妙藥女兒科的至寶血竭原來生雲南調經養血最為先那怕胎前產後病加上血竭自然安能生新血破死血活人通氣血竭就就是血竭的功效加上丁香丁香生來性本熱半似生薑半似麝若問此藥治何病能治上吐與下瀉加上黃連黃連生來性本寒止渴生津又利痰哪怕男女心火盛加上黃連自然安加上白硃砂白硃砂磁州城內是它家若問此藥治何病磨積化癖一把拿加上雄黃雄黃出在山中能解百毒有奇功加上貝母使君子蟲兒聞藥歸陰城反食味都是肚內有蟲加上川草二烏能入骨追風善治筋骨疼痛加上麝香麝香外臭惡內性香花果園裡緊提防懷胎婦人用此藥必定母子兩分張敢說這麼厲害你是不敢用它不成列位不知我用的熟的不是用的生的麝香能引諸藥歸經串透九竅有奇功扶助元氣調和五臟共加這些藥材那位老者說你要多少錢一張大的二百小的一百六十文我今到了你們貴處不過是按本錢賣上幾張這是拋磚引玉掛榜求賢含珠不吐不知是寶明珠不皎不知為貴無有千里之能僕人不能自往奇藥有百般效驗不貼在身上不見奇功我與你們治病先有一流水帳上面寫著第幾號一邊定著麼莊村姓字名誰還怕你們不放心給你們當治好了病的文書這才可以留錢若你們那病不去根再來取藥分文不要失票不認那位說你說的倒好我有爾病叫先生治治甚麼病若不忙我說說你們聽聽頭一件治心疼此症分九種敢說那九種心疼眾位聽真有食心疼有水心疼氣疼血疼寒疼火疼胃疼蟲疼痰疼有此九種心疼誰知是哪一樣疼有歌為證食疼水疼胸中脹氣疼血疼兩脅膨火疼胃疼飯後應寒疼蟲疼跳鑽火心疼腹內絞調理此症認分明急病緩治緩病不能速愈如今若是真心疼別說在下就是華佗復生亦不能治若有起死回生之手亦不能調治此症古今以來惟有一人可是真心疼而亡敢說此人為誰呢昔漢與司馬師大戰鐵龍山名叫姜維字伯約後拜孔明為師保阿斗太子四十餘年因為曹操又伐中原殺了曹操雄兵百萬戰將千員努力使盡把心使碎一陣心疼命歸於天如有九種心疼我這膏藥立貼即止有膨悶脹飽只因冷氣攻心寒茶冷食都來侵胃口常常發悶不是嘔吐酸水就是冷氣攻心氣裡寒食是病根勸君早早來問肚臍為六腑氣管為五臟之寒門將膏藥貼上一張吃上幾錢藥丸心口不叫心口叫胃口有病打掃乾淨食散能消百病皆除我把那三關九竅十二經絡五運六氣說了你們聽聽何為三關九竅人有上焦中焦下焦上焦屬心肺肺屬金心屬火名為金火之關中焦屬脾胃脾屬土胃屬木名為土木之關下焦屬腎合命門腎屬水命門屬火名為水火之關上焦如霧中焦如漚下焦如瀆這就知人的病在何處為一部何為九竅耳目口鼻舌咽前陰後陰為九竅有一竅不通便生病症何為五運六氣五運者甲已化土乙庚化金丁壬化木盡成材丙辛便是常流水戊癸屬火便為心這為五運六氣者風寒暑濕燥火是也知這六氣便知人病根源何為十二經絡人有五臟六腑五臟者心肝脾肺腎也六腑者大腸小腸膽胃膀胱也五臟屬陰在裡六腑屬陽在表人之得病有輕有重在表則輕在裡則重又要通脈訣脈為一身之主時有春夏秋冬脈有浮沉遲數藥有寒熱溫平人有虛實寒者溫之熱者涼之實者瀉之虛者補之當看病在哪一經哪一絡認的病真用的藥當一樣藥各有引子引子對了一治就好縱有十數年的大病無有治不好的有位朋友說賣藥的都是拘賣當的列位朋友你想當日孫真人治虎口龍鱗華佗刮骨去毒王叔和開棺治婦那古人都是拘賣當的列位問如今有三分金眼三分銅眼三分瞎眼不認的太多若有舍藥的來了這個不要錢那個不要錢一齊都不要錢這個說我腰疼那個說我腿疼這個說我老婆子經脈不調那個說我兒子還有積聚後來摟著一個紮了一針拔了一罐子不論什麼麵子藥吃在肚內就說有人參牛黃狗寶吐又吐不出來抓又抓不出來或是八佰或是一吊盡情留下臨走瞪瞪眼跺跺腳我可上了當了你看我也是賣藥先講價後吃藥不相干上不了當我這是姜太公釣魚願者上鉤我看過針灸大成扎針分九種針有翻天覆地之功起死回生之效無論什麼病百發百中其效如神也何為五臟六腑五臟是心肝脾肺腎心屬火肺屬金脾屬土肝屬木腎屬水六腑是膽胃大小腸膀胱也膽屬木胃屬土大腸屬金小腸屬火膀胱屬水肝與膽脾與胃肺與大腸心與小腸腎與膀胱三焦與命門浮脈為陽表病居遲風數熱緊寒拘浮而有力多風熱無力而浮是血虛沉潛水蓄陰經病數熱遲寒滑有痰無力而沉虛與氣沉而有力積並寒遲自減病或多痰沉痼癥瘕仔細看有力而遲為冷痰遲而無力為虛寒數脈為陽熱可知共將君相火來鑑實宜涼瀉虛溫補肺病積深都畏之告白四方親友知悉昨前某處趕集有人便問大棚大帳這是做什麼的我便說我是個賣藥的那人把嘴一咧便說出來了拘賣當的來了我就說一林之樹有曲有直一母之子有賢有愚行行出狀元萬馬出龍駒兵多出良將物高價出頭想往日那賣藥的與在下大不相同想往日那宗賣藥的俱說是無所不會無所不通無所不有大言不知自慚在下這位賣藥的可就不然雖然我亦不能上山打猛虎下海擒蚊龍不過素日習了一個眼科略有一半點材料象我這賣藥的會的高人見的高客有在下這般材料是什麼東西合會明公禮重高賢這叫作赤硇砂賽如飛蝶游魚一般明公啖了能飛能跑昨日某處趕集來了一位識者他便說我認的聽見俺叔說來也是那油門紅丹不就是二硃紅又一位說你不認的我哥哥當畫匠常使包樣銀硃又一位說恁們皆不認的俺兄弟走鹽申常擔琉璃貨買來的那個養魚瓶里頭盛的那個鴨子眼是包個點的不然他如何能起能走三人爭嚷起來打了個頭破血出給他們說了二三天事置酒和息俱都是他們的錢臨走送給我的盤費這才一了百結眾鄉親不必爭嚷聽著對你說相這硇砂有五色二樣有一樣鹽硇砂不可入藥有石硇砂方可入藥相這樣硇砂非神仙不能得列位有看過封神演義的便知昔日紂王伐夷蘇姐己殺害忠良扒腹看胎破骨驗髓立剜心盆肉山酒海大行無道如比干丞相諫之不從剖心飲酒又如忠良梅伯再三苦諫紂王大怒而反剜其雙目抱疼出朝路遇太乙真人將番硇砂點在梅伯眼裡立時從兩眼眶中長出兩支手來手心中又長出兩個眼來到後來三教共之封神榜將梅伯封為太歲玉皇殿前千里眼就是他除此以外別無所見相這石硇砂在朝領兵的元帥發兵出征之行時皇上給他一個木桶帶著若是攻鐵葉城門將石硇砂著在大炮筒子內能以打透城門有過鐵之力有爛肉之能還有營遂的頭目俱都有點若紮下營盤按下賬房埋鍋造飯若是吃肉那有仔細功夫燒煮將這硇砂著上一點鍋滾肉爛那是生的在下使的這個卻是熟的按雷公炮製砌上百眼爐文火三炷香武火三炷香升煉出來這才入藥磨云去翳全仗著它本草綱目有云硇砂本出在西番回回進寶到中原爛肉透鐵有功效磨云去翳它當先這是硇砂的功效黃連本是入眼科真乃眼中的聖藥旁人說眼藥有黃連原是耳聞的並無眼見實在在下這般眼藥是當面加減看著不是著上黃連呢列位相這醫不一科藥亦不一般昔日有一人害眼即請一位眼科先生來治那人並不知五輪八廓十二經絡寒熱虛實混而明說目中寒火是心寒火所致列位有讀書明禮的他便知曉相這個人果然心中有了寒即刻吃熱藥溫經散寒以發其表若實在是有了火即刻吃涼藥以攻下火而竟不然但說是寒火即刻吃寒熱藥象在下這個眼科認病真切用藥恰當即用黃連之說不一般有一等川黃連出在西川有一等草連出在登州有一等水連出在蘇杭由紫黃緞子出了性的俱不可入眼藥象我用的這黃連名叫慈黃連價值最重原是斤對斤兩對兩的出在海東波斯國峨嵋觀音老母在此出家後來遷居普陀山留下三宗寶貝頭一宗即是慈黃連本草有云老母留下慈黃連能入心經把火散點在眼內涼如冰清熱退火是神仙這是慈黃連的功效列位忙的散了閒的點了待我對出這眼藥來叫親友看看一位不成散二位不成丹我再加上熊膽列位看看象這個熊膽這個字人皆唸錯了是該念個形字怎麼該念形字呢本草有云是個什麼形象就是個什麼念形那狗熊原是狗形象即叫了狗熊也豬熊也有那豬的形人形象即為人熊那象不一樣膽不一般狗熊膽是黃的屬中央戊己土白形膽是白的屬西方庚辛金我這個白形膽善能分塵去垢該看著即如這個碗比做個眼圈子這水即是個眼珠子這些灰即是眼中雲翳白形膽善能分塵去垢這不即開了昨前我在某處趕集有人說這灰是輕的鄉親看了我叫颳了這些灰看見了麼這亦不算為奇象這墨是黏的內有水膠將這墨研在這碟里就能開看見了沒有這形膽善治雲翳後有本草詩云形膽力大是神仙撥雲去翳他當先點在眼裡如磨鏡萬里雲霧盡了然這是形膽的功效待我再加上冰片叫親友們看看這個冰片退熱降火之聖藥真來合會人等有明公者是禮中高賢昨日我上西某處趕集來了一位讀書的先生他便問我說是先生你用的這片可是龍片呢可是蟒片呢我是說何為龍片何為蟒片呢他說這荒野大山裡那石洞中那蟒喘的那氣結聚成冰即是蟒片龍喘的氣即是龍片我便問他你那宅子上有幾座屋子呢他便說有五座屋子我問他有幾口人呢他說有十餘口人我又問他你這屋住了幾輩子了呢他說除了新屋都住了好幾輩子的老屋我說你那屋裡人喘氣只是多年氣結了多少人片呢他便無言答對因而領教於我我便說親友們聽著這個冰片有三等一等是樟樹上出的那津液結聚雷公炮製成了即為樟片潮腦升打成了即為腦片再加升練即為泥片象我用的這一宗梅花冰片出在萬里終南