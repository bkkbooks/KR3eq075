來運不均件件事來不遂心昔年你是富貴家你也曾幫過窮人至到如今手中乏無一人幫你分文山上猛虎雄心在我勸你暫且忍耐君子人窮心不窮日後漸漸到瓊臺鐵樹開花似堵牆你家生個貴子郎鐵樹囂囂生貴子後來比你爹孃強眼要黑來又要白黑白二眼分兩開昔日趙雲黑白眼一十二歲把兵排雖然不如趙雲將准到後來命亦強眉亦清來目亦秀眉清目秀髮老年昔日關公臥蠶眉死後旺運三千年雖然不如關夫子好運也有幾十年耳要大來又要軟耳大輪大有精神昔日劉備耳垂大他在西川坐明君雖然不得明君坐後來原是有福人唇要赤來口要方唇赤口方有餘糧昔日韓信唇口好老來命比少年強鼻子要大又要圓鼻有田膽發中年昔日彭祖鼻子大彭祖活了八百年雖然不敵彭老祖壽獻能活八十年二眉彎彎似張弓兩眼飄飄若明珠等著皇王開了科龍虎榜上得高名面似龍虎真可畏望之儼然有災星上能以光宗耀祖下能以教子訓孫此相生來最忠厚無義之財俱不貪無義之食總不吃在外交友主忠信在內處家能孝慈
